name: Publish to npm

# Triggered by pushing a tag like `v0.1.0`, `v0.2.0`, etc.
# To release:
#   1. Bump the "version" in package.json
#   2. Commit and push to main
#   3. Tag: `git tag v0.x.y && git push --tags`
# This workflow then builds, tests the MCP handshake, and publishes to npm.
#
# Required repo secret: NPM_TOKEN  — an npm "Automation" or "Publish" token
# scoped to the irlevents-mcp package. Generate at
# https://www.npmjs.com/settings/<your-user>/tokens, then add to:
# Settings → Secrets and variables → Actions → New repository secret.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance attestation
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "✓ Publishing v$PKG_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke-test MCP handshake
        env:
          IRLEVENTS_API_KEY: api_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        run: |
          # Send initialize + tools/list and verify all 12 tools are registered.
          # Uses a syntactically-valid but unauthorized key — the API will reject
          # actual tool invocations with 401, but the wire-format check passes.
          OUTPUT=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci","version":"0.0.1"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
            | timeout 10 node dist/index.js 2>/dev/null)
          TOOL_COUNT=$(echo "$OUTPUT" | grep -o '"name":"[a-z_]*"' | sort -u | wc -l)
          if [ "$TOOL_COUNT" -lt 12 ]; then
            echo "::error::Expected 12 tools, got $TOOL_COUNT"
            echo "$OUTPUT"
            exit 1
          fi
          echo "✓ MCP handshake OK ($TOOL_COUNT tools registered)"

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
